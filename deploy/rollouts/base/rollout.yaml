apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: echo
  namespace: echo
spec:
  replicas: 4
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
        - name: echo
          image: python:3.12-alpine
          command: ["python", "-c"]
          args:
            - |
              import os
              from http.server import BaseHTTPRequestHandler, HTTPServer

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      self.send_response(200)
                      self.end_headers()
                      if self.path == "/health":
                          self.wfile.write(b"ok\n")
                          return
                      region = os.environ.get("REGION", "unknown")
                      self.wfile.write(f"ok region={region}\n".encode())

                  def log_message(self, *_):
                      pass

              HTTPServer(("", 8080), Handler).serve_forever()
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 3
  strategy:
    canary:
      canaryService: echo-canary
      stableService: echo-stable
      trafficRouting:
        istio:
          virtualService:
            name: echo-rollouts
            routes: [ "primary" ]
      steps:
        - setWeight: 10
        - pause: { duration: 60 }
        - analysis:
            templates:
              - templateName: success-rate
        - setWeight: 25
        - pause: { duration: 60 }
        - setWeight: 50
        - pause: { duration: 60 }
